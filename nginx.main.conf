# =============================================================================
# Nginx main config — tuned for 3000+ concurrent users
# Replaces /etc/nginx/nginx.conf inside the nginx container
# =============================================================================

user  nginx;
worker_processes  auto;           # matches number of CPU cores
worker_rlimit_nofile  65535;      # max open files per worker

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;     # per worker; total = workers × 4096
    use  epoll;                   # Linux edge-triggered I/O (most efficient)
    multi_accept  on;             # accept as many connections as possible per wake
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─── Logging ────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" rt=$request_time '
                      'upstream_rt=$upstream_response_time';
    access_log  /var/log/nginx/access.log  main  buffer=64k  flush=5s;

    # ─── Core Performance ───────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    keepalive_requests  1000;
    reset_timedout_connection  on;

    # ─── Buffer Tuning ──────────────────────────────────────────────────────
    client_body_buffer_size     128k;
    client_max_body_size        10m;
    client_header_buffer_size   4k;
    large_client_header_buffers 4 32k;
    output_buffers              2 32k;
    postpone_output             1460;

    # ─── Timeouts ───────────────────────────────────────────────────────────
    client_header_timeout  15s;
    client_body_timeout    15s;
    send_timeout           30s;
    proxy_connect_timeout  10s;
    proxy_send_timeout     60s;
    proxy_read_timeout     60s;

    # ─── Gzip Compression ───────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        application/json
        application/javascript
        application/x-javascript
        application/xml
        text/plain
        text/css
        text/javascript
        text/xml
        image/svg+xml
        font/woff2;

    # ─── Open File Cache ────────────────────────────────────────────────────
    open_file_cache          max=10000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    # ─── Rate Limit Zones ───────────────────────────────────────────────────
    # 10MB zone → stores ~160k IP addresses
    limit_req_zone   $binary_remote_addr  zone=api_zone:10m    rate=100r/s;
    limit_req_zone   $binary_remote_addr  zone=login_zone:1m   rate=5r/m;
    limit_req_zone   $binary_remote_addr  zone=upload_zone:1m  rate=10r/s;
    limit_conn_zone  $binary_remote_addr  zone=conn_zone:10m;

    # ─── Proxy Cache (for GET /tournaments, /games, etc.) ───────────────────
    proxy_cache_path  /var/cache/nginx
                      levels=1:2
                      keys_zone=api_cache:10m
                      max_size=500m
                      inactive=60s
                      use_temp_path=off;

    # ─── Real IP (behind load balancer) ─────────────────────────────────────
    # real_ip_header     X-Forwarded-For;
    # set_real_ip_from   10.0.0.0/8;

    # ─── Hide version ───────────────────────────────────────────────────────
    server_tokens  off;

    include /etc/nginx/conf.d/*.conf;
}

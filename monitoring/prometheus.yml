global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Attach these labels to all time series and alerts from this Prometheus instance.
  external_labels:
    env: production
    project: porjar

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: 'porjar-api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics
    # Prometheus is on the internal porjar-net Docker network and connects via
    # the service name, so the IP check in the API will pass without auth.

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

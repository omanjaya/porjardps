global:
  # Default time to wait before sending a repeated notification for a resolved alert.
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'null'

  routes:
    - match:
        severity: critical
      receiver: 'null'
      continue: true

receivers:
  # Default no-op receiver.  Replace with a real notifier (Slack, PagerDuty, email)
  # by filling in the configuration below and setting credentials via env vars.
  - name: 'null'

  # Example Slack receiver (uncomment and configure):
  # - name: 'slack-porjar'
  #   slack_configs:
  #     - api_url: '${SLACK_WEBHOOK_URL}'
  #       channel: '#porjar-alerts'
  #       send_resolved: true
  #       title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
  #       text: >-
  #         {{ range .Alerts }}
  #         *Alert:* {{ .Annotations.summary }}
  #         *Description:* {{ .Annotations.description }}
  #         {{ end }}

inhibit_rules:
  # Suppress warning-level alerts when a critical alert for the same target fires.
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']

# =============================================================================
# DEPLOYMENT NOTE: Replace esport.porjar-denpasar.id with your actual domain
# =============================================================================

# ─── Upstream Pools ──────────────────────────────────────────────────────────
upstream api_upstream {
    server api:8080;
    keepalive 64;           # keep 64 idle connections to Go API
    keepalive_requests 500;
    keepalive_timeout  60s;
}

upstream web_upstream {
    server web:3000;
    keepalive 16;
    keepalive_requests 200;
    keepalive_timeout  30s;
}

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────────
server {
    listen 80;
    server_name esport.porjar-denpasar.id;

    # Allow Let's Encrypt ACME challenges through
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name esport.porjar-denpasar.id;

    # ─── SSL ─────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/esport.porjar-denpasar.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/esport.porjar-denpasar.id/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    # Session resumption — reduces TLS handshake cost for returning clients
    ssl_session_cache   shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;    # GDPR: no cross-server session sharing

    # OCSP Stapling — attach cert validity proof to reduce client round-trips
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ─── Security Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"      always;
    add_header X-Frame-Options           "SAMEORIGIN"   always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

    # ─── Connection limits ───────────────────────────────────────────────────
    limit_conn conn_zone 50;    # max 50 simultaneous connections per IP

    # ─── Frontend ────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";    # keep-alive with upstream
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Next.js static assets — long cache
        location ~* \.(js|css|woff2?|ico|png|jpg|jpeg|webp|avif|svg)$ {
            proxy_pass         http://web_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            expires            1y;
            add_header         Cache-Control "public, immutable";
            access_log         off;
        }
    }

    # ─── API ─────────────────────────────────────────────────────────────────
    location /api/ {
        # General API rate limit: 100 req/s per IP with burst of 200
        limit_req  zone=api_zone  burst=200  nodelay;
        limit_req_status 429;

        proxy_pass         http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Connection       "";
        proxy_set_header   Host             $host;
        proxy_set_header   X-Real-IP        $remote_addr;
        proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 32k;

        # ── Stricter limit for login endpoint ────────────────────────────────
        location = /api/v1/auth/login {
            limit_req  zone=login_zone  burst=10  nodelay;
            limit_req_status 429;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # ── File upload endpoint ──────────────────────────────────────────────
        location = /api/v1/upload {
            limit_req         zone=upload_zone  burst=20  nodelay;
            client_max_body_size 10m;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ── Cache read-heavy public GET endpoints ────────────────────────────
        location ~* ^/api/v1/(games|tournaments)($|/) {
            limit_req  zone=api_zone  burst=500  nodelay;

            proxy_pass         http://api_upstream;
            proxy_http_version 1.1;
            proxy_set_header   Connection       "";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Only cache GET without Authorization header (anonymous viewers)
            proxy_cache        api_cache;
            proxy_cache_key    "$scheme$host$request_uri";
            proxy_cache_valid  200 10s;   # 10-second micro-cache absorbs read storms
            proxy_cache_use_stale error timeout updating http_500 http_503;
            proxy_cache_lock   on;        # coalesce concurrent misses → 1 upstream req
            proxy_cache_bypass $http_authorization;
            proxy_no_cache     $http_authorization;

            add_header X-Cache-Status $upstream_cache_status;
        }
    }

    # ─── WebSocket ───────────────────────────────────────────────────────────
    location /ws {
        # Generous burst: tournament events can be spiky
        limit_req  zone=api_zone  burst=50  nodelay;

        proxy_pass          http://api_upstream;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout  3600s;   # 1h — keep WS connections alive
        proxy_send_timeout  3600s;

        proxy_buffering     off;     # disable for real-time streaming
    }

    # ─── Static Uploads ──────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://api_upstream/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        expires    30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── Health Check (no rate limit, no logging) ────────────────────────────
    location = /health {
        proxy_pass         http://api_upstream/health;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        access_log         off;
    }

    # ─── Block common scanner paths ──────────────────────────────────────────
    location ~* \.(php|asp|aspx|jsp|cgi)$ {
        return 404;
    }
    location ~ /\. {
        deny all;
    }
}

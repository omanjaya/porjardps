version: '3.9'

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # ─── PostgreSQL Tuning (4 vCPU / 8 GB RAM VPS) ───────────────────────────
    # Calculated via pgtune for web application workload.
    command: >
      postgres
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c maintenance_work_mem=256MB
        -c work_mem=8MB
        -c max_connections=250
        -c wal_buffers=64MB
        -c max_wal_size=2GB
        -c min_wal_size=512MB
        -c checkpoint_completion_target=0.9
        -c default_statistics_target=200
        -c synchronous_commit=off
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_worker_processes=4
        -c max_parallel_workers_per_gather=2
        -c max_parallel_workers=4
        -c max_parallel_maintenance_workers=2
        -c jit=off
        -c log_min_duration_statement=500
        -c log_line_prefix='%t [%p] %u@%d '
        -c shared_preload_libraries=pg_stat_statements
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - porjar-net

  redis:
    image: redis:${REDIS_VERSION:-7}-alpine
    restart: always
    # ─── Redis Tuning ─────────────────────────────────────────────────────────
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --appendonly yes
        --maxmemory 1gb
        --maxmemory-policy allkeys-lru
        --hz 20
        --aof-rewrite-incremental-fsync yes
        --rdb-save-incremental-fsync yes
        --tcp-backlog 511
        --timeout 300
        --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - porjar-net

  api:
    image: porjar/api:${PORJAR_VERSION:-latest}
    restart: always
    env_file: .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/storage/uploads
    networks:
      - porjar-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    # Limit container so a CPU spike can't starve postgres/nginx
    deploy:
      resources:
        limits:
          cpus: '3'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 256M

  web:
    image: porjar/web:${PORJAR_VERSION:-latest}
    restart: always
    env_file: .env.prod.web
    depends_on:
      api:
        condition: service_healthy
    networks:
      - porjar-net
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  nginx:
    image: nginx:1.25-alpine
    restart: always
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx.main.conf:/etc/nginx/nginx.conf:ro
      - certbot_data:/etc/letsencrypt:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    networks:
      - porjar-net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 256M

  # ── Monitoring stack ────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    networks:
      - porjar-net
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - porjar-net
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: always
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable"
      PG_EXPORTER_AUTO_DISCOVER_DATABASES: "true"
    networks:
      - porjar-net
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  redis-exporter:
    image: oliver006/redis_exporter:latest
    restart: always
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - porjar-net
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  alertmanager:
    image: prom/alertmanager:latest
    restart: always
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    networks:
      - porjar-net
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  certbot_data:
  nginx_cache:
  prometheus_data:
  grafana_data:

networks:
  porjar-net:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1500
